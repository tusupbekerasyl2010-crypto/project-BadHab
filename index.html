<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>BadHab Pro</title>

<style>
body{
    margin:0;
    background:linear-gradient(120deg,#667eea,#764ba2);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}

.phone{
    width:370px;
    height:740px;
    border-radius:40px;
    padding:12px;
    background:rgba(0,0,0,0.4);
    box-shadow:0 30px 80px rgba(0,0,0,0.5);
}

.screen{
    height:100%;
    border-radius:30px;
    padding:18px;
    overflow:auto;
    backdrop-filter:blur(20px);
    background:rgba(255,255,255,0.1);
    color:white;
}

h2{
    text-align:center;
    margin:5px 0 15px;
    font-weight:600;
}

.card{
    background:rgba(255,255,255,0.12);
    border-radius:18px;
    padding:14px;
    margin-bottom:14px;
}

.habit{
    display:flex;
    justify-content:space-between;
    margin:8px 0;
}

button{
    border:none;
    border-radius:12px;
    padding:6px 10px;
    margin:3px;
    cursor:pointer;
    background:rgba(255,255,255,0.2);
    color:white;
}

.active{
    background:white;
    color:black;
}

.message{
    margin-top:10px;
    padding:8px;
    border-radius:10px;
    text-align:center;
    font-size:14px;
}

.advice{
    background:rgba(255,255,255,0.2);
    padding:10px;
    border-radius:12px;
    margin:6px 0;
    font-size:14px;
}

canvas{
    width:100%;
    height:140px;
    border-radius:12px;
    background:rgba(255,255,255,0.1);
}
</style>
</head>

<body>

<div class="phone">
<div class="screen">

<h2>BadHab Pro</h2>

<!-- HABITS -->
<div class="card">
<b>Today's Habits</b>
<div class="habit">Phone Overuse <input type="checkbox"></div>
<div class="habit">Late Sleep <input type="checkbox"></div>
<div class="habit">Lack of Focus <input type="checkbox"></div>
</div>

<!-- MOOD -->
<div class="card">
<b>Mood</b><br>
<button onclick="setMood(this,2)">😄</button>
<button onclick="setMood(this,1)">😐</button>
<button onclick="setMood(this,0)">😔</button>

<div id="moodMsg" class="message"></div>
</div>

<!-- GRAPH -->
<div class="card">
<b>Mood Progress</b>
<canvas id="chart"></canvas>
</div>

<!-- STYLE -->
<div class="card">
<b>Coaching Style</b><br>
<button onclick="setStyle(this,'soft')">Soft</button>
<button onclick="setStyle(this,'strict')">Strict</button>
<button onclick="setStyle(this,'real')">Real Talk</button>
</div>

<!-- ADVICE -->
<div class="card">
<b>Advice</b>
<div id="advice"></div>
</div>

</div>
</div>

<script>
let moods = JSON.parse(localStorage.getItem("moods")) || [];
let style = "soft";

function setMood(btn,val){
    document.querySelectorAll("button").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");

    moods.push(val);
    localStorage.setItem("moods",JSON.stringify(moods));

    let msg=document.getElementById("moodMsg");

    if(val===2) msg.innerHTML="You're on a roll 🚀";
    if(val===1) msg.innerHTML="It's a normal day — keep going";
    if(val===0) msg.innerHTML="Tough day. Just take one small step";

    draw();
    generateAdvice();
}

function setStyle(btn,s){
    document.querySelectorAll(".card:nth-child(4) button").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    style=s;
    generateAdvice();
}

function generateAdvice(){
    let list=[];

    if(style==="soft"){
        list=[
            "Take it slow — small steps matter 🌱",
            "Rest for 5 minutes, you're not a machine",
            "Just start, no pressure",
            "You're already doing better than yesterday",
            "Breathe — stress will pass",
            "Focus on one task only"
        ];
    }

    if(style==="strict"){
        list=[
            "Stop delaying. Start now.",
            "Discipline beats motivation",
            "You either control yourself or you don't",
            "Pick one task. Finish it.",
            "No mood? Doesn't matter.",
            "Tired? Work slower, but don't stop"
        ];
    }

    if(style==="real"){
        list=[
            "Do 5 minutes, then decide",
            "Put your phone away — instant upgrade",
            "You're not lazy, you're overloaded",
            "Your brain wants easy — don't give it that",
            "Start with a 3-minute timer",
            "It's hard now, easier later"
        ];
    }

    let box=document.getElementById("advice");
    box.innerHTML="";

    list.forEach(a=>{
        box.innerHTML += "<div class='advice'>"+a+"</div>";
    });
}

function draw(){
    let c=document.getElementById("chart");
    let ctx=c.getContext("2d");

    ctx.clearRect(0,0,c.width,c.height);

    ctx.beginPath();
    ctx.moveTo(0,140);

    moods.forEach((m,i)=>{
        let x=i*30;
        let y=140-(m*40);
        ctx.lineTo(x,y);
    });

    ctx.stroke();
}

draw();
generateAdvice();
</script>

</body>
</html>
