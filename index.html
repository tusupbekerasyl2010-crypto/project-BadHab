<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bad Habits Tracker</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

.container {
  padding: 20px;
}

h1 {
  text-align: center;
}

.card {
  background: #1e293b;
  padding: 15px;
  border-radius: 15px;
  margin-bottom: 15px;
}

button {
  padding: 10px;
  margin: 5px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

.success { background: #22c55e; }
.fail { background: #ef4444; }
.quote-btn { background: #3b82f6; }

select {
  padding: 10px;
  border-radius: 10px;
  width: 100%;
}

.chart-container {
  overflow-x: auto;
}

canvas {
  background: #111827;
  border-radius: 10px;
  margin-top: 10px;
}

.mood button {
  font-size: 20px;
}
</style>
</head>

<body>

<div class="container">
  <h1>Bad Habits Tracker</h1>

  <div class="card">
    <h3>Select Habit</h3>
    <select id="habit">
      <option>Smoking</option>
      <option>Phone addiction</option>
      <option>Fast food</option>
      <option>Gaming</option>
      <option>Sweets</option>
      <option>Caffeine</option>
      <option>Procrastination</option>
    </select>
  </div>

  <div class="card">
    <h3>Current streak: <span id="streak">0</span> days</h3>
    <button class="success" onclick="successDay()">I resisted</button>
    <button class="fail" onclick="failDay()">I failed</button>
  </div>

  <div class="card mood">
    <h3>How do you feel?</h3>
    <button onclick="setMood('good')">😀</button>
    <button onclick="setMood('ok')">😐</button>
    <button onclick="setMood('angry')">😡</button>
    <button onclick="setMood('tired')">😩</button>
    <button onclick="setMood('bad')">😔</button>
  </div>

  <div class="card">
    <h3>Progress Chart</h3>
    <div class="chart-container">
      <canvas id="chart" height="200"></canvas>
    </div>
  </div>

  <div class="card">
    <h3>Motivation</h3>
    <p id="quote"></p>
    <button class="quote-btn" onclick="changeQuote()">New Quote</button>
  </div>

</div>

<script>
let streak = Number(localStorage.getItem("streak")) || 0;
let history = JSON.parse(localStorage.getItem("history")) || [];
let moods = JSON.parse(localStorage.getItem("moods")) || [];

document.getElementById("streak").innerText = streak;

const quotes = [
  "Discipline equals freedom — Jocko Willink",
  "We are what we repeatedly do — Aristotle",
  "The only way out is through — Robert Frost",
  "He who conquers himself is strongest — Confucius",
  "It does not matter how slowly you go as long as you do not stop — Confucius",
  "Success is the sum of small efforts repeated daily — Robert Collier",
  "Do what is hard now so life can be easy later — Unknown",
  "Your future depends on what you do today — Mahatma Gandhi",
  "Motivation gets you going, discipline keeps you growing — John C. Maxwell",
  "You will never always be motivated, you must learn to be disciplined — Unknown",
  "Don’t watch the clock; do what it does. Keep going — Sam Levenson",
  "Fall seven times and stand up eight — Japanese Proverb",
  "The pain you feel today will be the strength you feel tomorrow — Unknown",
  "Small steps every day lead to big results — Unknown",
  "Control your habits or they will control you — Unknown",
  "A year from now you will wish you started today — Unknown",
  "The best way to predict your future is to create it — Peter Drucker",
  "Act as if what you do makes a difference. It does — William James",
  "Push yourself because no one else is going to do it for you — Unknown",
  "Great things never come from comfort zones — Unknown",
  "Hard choices, easy life. Easy choices, hard life — Unknown",
  "Discipline is choosing between what you want now and what you want most — Abraham Lincoln",
  "Energy and persistence conquer all things — Benjamin Franklin",
  "What we fear doing most is usually what we most need to do — Tim Ferriss",
  "Start where you are. Use what you have. Do what you can — Arthur Ashe",
  "Success doesn’t come from what you do occasionally, but what you do consistently — Unknown",
  "You don’t have to be great to start, but you have to start to be great — Zig Ziglar",
  "Difficult roads often lead to beautiful destinations — Unknown",
  "Stay hard — David Goggins",
  "No excuses — Unknown"
];

let lastQuoteIndex = -1;

function changeQuote() {
  let index;
  do {
    index = Math.floor(Math.random() * quotes.length);
  } while (index === lastQuoteIndex);

  lastQuoteIndex = index;
  document.getElementById("quote").innerText = quotes[index];
}

changeQuote();

function successDay() {
  streak++;
  history.push(streak);
  moods.push("good");
  save();
  drawChart();
}

function failDay() {
  streak = 0;
  history.push(0);
  moods.push("bad");
  save();
  drawChart();
}

function setMood(mood) {
  if (moods.length > 0) {
    moods[moods.length - 1] = mood;
  }
  save();
  drawChart();
}

function save() {
  localStorage.setItem("streak", streak);
  localStorage.setItem("history", JSON.stringify(history));
  localStorage.setItem("moods", JSON.stringify(moods));
  document.getElementById("streak").innerText = streak;
}

function getMoodColor(mood) {
  switch(mood) {
    case "good": return "#22c55e";
    case "ok": return "#eab308";
    case "angry": return "#ef4444";
    case "tired": return "#3b82f6";
    case "bad": return "#6b7280";
    default: return "#22c55e";
  }
}

function drawChart() {
  let canvas = document.getElementById("chart");
  let ctx = canvas.getContext("2d");

  canvas.width = history.length * 40;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (history.length > 0) {
    ctx.beginPath();
    ctx.moveTo(0, 200 - history[0]*10);

    for (let i = 1; i < history.length; i++) {
      ctx.lineTo(i * 40, 200 - history[i]*10);
    }

    ctx.strokeStyle = "#22c55e";
    ctx.stroke();

    for (let i = 0; i < history.length; i++) {
      ctx.beginPath();
      ctx.arc(i * 40, 200 - history[i]*10, 5, 0, 2 * Math.PI);
      ctx.fillStyle = getMoodColor(moods[i]);
      ctx.fill();
    }
  }
}

drawChart();
</script>

</body>
</html>
