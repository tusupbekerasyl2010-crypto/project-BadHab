<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BadHab Final</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
    margin:0;
    font-family:Poppins,Arial;
    background:linear-gradient(135deg,#0f172a,#1e293b);
    color:white;
}

header{
    display:flex;
    justify-content:space-between;
    padding:18px 40px;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(10px);
    position:sticky;
    top:0;
}

nav a{
    margin:0 12px;
    color:white;
    text-decoration:none;
    cursor:pointer;
    transition:0.3s;
}

nav a:hover{
    color:#38bdf8;
}

.section{
    padding:60px;
}

.card{
    padding:12px;
    margin:10px;
    background:rgba(255,255,255,0.08);
    border-radius:12px;
    cursor:pointer;
    display:inline-block;
}

.active{
    background:#38bdf8 !important;
}

button{
    padding:10px 15px;
    margin:5px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background:#38bdf8;
    color:white;
}

.box{
    background:rgba(255,255,255,0.06);
    padding:20px;
    border-radius:16px;
    margin-top:15px;
}

h2{
    margin-bottom:15px;
}

#quote{
    font-size:18px;
    line-height:1.6;
}

</style>
</head>

<body>

<header>
<div><b>BadHab</b></div>

<nav>
<a onclick="go('habits')">Habits</a>
<a onclick="go('moods')">Mood</a>
<a onclick="go('progress')">Progress</a>
<a onclick="go('quotes')">Quotes</a>
</nav>
</header>

<!-- HABITS -->
<div id="habits" class="section">
<h2>Bad Habits</h2>

<div class="card" onclick="toggle(this)">Smoking</div>
<div class="card" onclick="toggle(this)">Social Media</div>
<div class="card" onclick="toggle(this)">Gaming</div>
<div class="card" onclick="toggle(this)">Junk Food</div>

<div class="box" id="adviceBox">
Advice: Start small. Reduce one habit at a time.
</div>
</div>

<!-- MOOD -->
<div id="moods" class="section">
<h2>Mood Tracker</h2>

<button onclick="mood(this,-10)">Angry 😡</button>
<button onclick="mood(this,-5)">Sad 😔</button>
<button onclick="mood(this,0)">Neutral 😐</button>
<button onclick="mood(this,5)">Happy 😊</button>
<button onclick="mood(this,10)">Motivated 🔥</button>

<div class="box" id="moodText">Mood not selected</div>
</div>

<!-- PROGRESS -->
<div id="progress" class="section">
<h2>Progress Analytics</h2>

<canvas id="chart"></canvas>

<div class="box">
Streak: <span id="streak">0</span> days
</div>

<div class="box">
<button onclick="relapse(true)">I relapsed</button>
<button onclick="relapse(false)">I stayed strong</button>

<div id="relapseMsg"></div>
</div>
</div>

<!-- QUOTES -->
<div id="quotes" class="section">
<h2>Motivation</h2>

<div class="box">
<p id="quote"></p>
<button onclick="nextQuote()">Next Quote</button>
</div>

</div>

<script>

let streak = 0;
let moodValue = 0;

const quotes = [
"Discipline is choosing what you want most over what you want now.",
"The pain of discipline is better than the pain of regret.",
"You don’t need motivation, you need consistency.",
"Small steps every day lead to big change."
];

let quoteIndex = 0;

document.getElementById("quote").innerText = quotes[0];

function nextQuote(){
    quoteIndex = (quoteIndex + 1) % quotes.length;
    document.getElementById("quote").innerText = quotes[quoteIndex];
}

function go(id){
    document.getElementById(id).scrollIntoView({behavior:"smooth"});
}

function toggle(el){
    el.classList.toggle("active");

    document.getElementById("adviceBox").innerText =
    "Advice: Focus on breaking one habit at a time, not all at once.";
}

function mood(btn,value){

    moodValue = value;

    document.querySelectorAll("button").forEach(b=>{
        b.classList.remove("active");
    });

    btn.classList.add("active");

    document.getElementById("moodText").innerText =
    "Mood impact: " + value;

    updateChart();
}

let chart = new Chart(document.getElementById("chart"),{
    type:"line",
    data:{
        labels:[],
        datasets:[{
            label:"Progress",
            data:[],
            borderColor:"#38bdf8"
        }]
    }
});

function updateChart(){

    let last = chart.data.datasets[0].data.slice(-1)[0] || 50;
    let newValue = last + moodValue;

    chart.data.labels.push("Day");
    chart.data.datasets[0].data.push(newValue);

    chart.update();
}

function relapse(val){

    if(val){
        streak = 0;
        document.getElementById("relapseMsg").innerText =
        "You relapsed. Restart from zero.";
    }else{
        streak++;
        document.getElementById("relapseMsg").innerText =
        "Good job. Keep going 🔥";
    }

    document.getElementById("streak").innerText = streak;
}

</script>

</body>
</html>
